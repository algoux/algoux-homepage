    <script>
      var systemThemeMediaQuery = window.matchMedia(
        "(prefers-color-scheme: dark)"
      );
      var applySystemTheme = function () {
        document.documentElement.classList.toggle(
          "dark",
          systemThemeMediaQuery.matches
        );
        document.documentElement.classList.toggle(
          "light",
          !systemThemeMediaQuery.matches
        );
      };
      applySystemTheme();
      if (systemThemeMediaQuery.addEventListener) {
        systemThemeMediaQuery.addEventListener("change", applySystemTheme);
      } else if (systemThemeMediaQuery.addListener) {
        systemThemeMediaQuery.addListener(applySystemTheme);
      }
    </script>
